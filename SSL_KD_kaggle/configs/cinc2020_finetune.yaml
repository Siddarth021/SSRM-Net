# Finetuning Config for PhysioNet 2020
data:
  dataset_name: "cinc2020"
  data_dir: "/kaggle/input/physionet-2020/"
  score_path: "/kaggle/input/physionet-2020/dx_mapping_scored.csv"
  split: "0"
  target_fs: 257
  seq_length: 4096
  lead2_sec: 15.94
  morphology_sec: 2.5
  num_classes: 24

training:
  batch_size: 32
  num_workers: 4
  epochs: 40
  learning_rate: 0.0003
  weight_decay: 0.00001
  device: "cuda"

checkpoints:
  save_dir: "/kaggle/working/checkpoints"
  pretrained_ssl_teacher: "/kaggle/working/checkpoints/best_ssl_teacher.pth"
  best_teacher_finetuned: "checkpoints/cinc2020_best_teacher_finetuned.pth"
  classifier_head: "checkpoints/cinc2020_classifier_head.pth"
