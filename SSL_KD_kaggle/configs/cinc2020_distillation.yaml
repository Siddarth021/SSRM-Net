# Distillation Config for PhysioNet 2020
data:
  dataset_name: "cinc2020"
  data_dir: "/kaggle/input/physionet-2020/"
  score_path: "/kaggle/input/physionet-2020/dx_mapping_scored.csv"
  split: "0"
  target_fs: 257
  seq_length: 4096
  lead2_sec: 15.94
  morphology_sec: 2.5
  num_classes: 24

training:
  batch_size: 32
  num_workers: 4
  epochs: 50
  learning_rate: 0.0005
  weight_decay: 0.00001
  device: "cuda"

kd:
  temperature: 2.0
  alpha: 0.5

checkpoints:
  save_dir: "/kaggle/working/checkpoints"
  teacher_checkpoint: "/kaggle/working/checkpoints/best_teacher_finetuned.pth"
  best_student_distilled: "checkpoints/cinc2020_best_student_distilled.pth"
