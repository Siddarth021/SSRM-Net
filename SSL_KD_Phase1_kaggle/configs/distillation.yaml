# Student Knowledge Distillation Config
data:
  data_dir: "D:\\Datasets\\PTBXL\\"
  score_path: "D:\\Datasets\\PTBXL\\scp_statements.csv"
  split: "0"

training:
  batch_size: 16
  epochs: 20
  learning_rate: 0.0005
  weight_decay: 0.00001
  device: "cuda"
  num_classes: 5
  temperature: 2.0
  alpha: 0.5       # BCE classification weight
  beta: 0.3        # Feature matching MSE loss weight
  gamma: 0.2       # Logits KL divergence weight

checkpoints:
  save_dir: "checkpoints/"
  teacher_checkpoint: "checkpoints/best_teacher_finetuned.pth"
